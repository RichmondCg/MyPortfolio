<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <meta http-equiv="refresh" content="0; url=/MyPortfolio/" />
    <script>
      // Single-page app redirect for GitHub Pages.
      const base = "/MyPortfolio/";
      const path = window.location.pathname.replace(base, "");
      const redirect = `${base}#/${path}${window.location.search}${window.location.hash}`;
      window.location.replace(redirect);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
